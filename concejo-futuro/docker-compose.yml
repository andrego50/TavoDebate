services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: concejo_futuro
      POSTGRES_USER: concejo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concejo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Puerto 5432 EXPUESTO SOLO al docker network. Ya no se publica al
    # host; para consultas ad-hoc usar:
    #   docker exec concejo-futuro-postgres-1 psql -U concejo -d concejo_futuro
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Redis SOLO dentro del docker network. Para consultas ad-hoc:
    #   docker exec concejo-futuro-redis-1 redis-cli
    expose:
      - "6379"

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: orchestrator
    ports:
      - "8001:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    volumes:
      - ./media:/app/media
      - ./backups:/app/backups

  agent-chat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: chat
    depends_on:
      - orchestrator
    restart: unless-stopped
    deploy:
      replicas: 4

  agent-intel:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: intel
    depends_on:
      - orchestrator
    restart: unless-stopped

  agent-control:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: control
    depends_on:
      - orchestrator
    restart: unless-stopped
    volumes:
      - ./media:/app/media

  agent-pantalla:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: pantalla
    ports:
      - "8085:8080"
    depends_on:
      - orchestrator
    restart: unless-stopped

  agent-audio:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: audio
    depends_on:
      - orchestrator
    restart: unless-stopped
    volumes:
      - audio_cache:/app/audio_cache

  agent-simulation:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: simulation
    depends_on:
      - orchestrator
    restart: unless-stopped

volumes:
  postgres_data:
  audio_cache:
